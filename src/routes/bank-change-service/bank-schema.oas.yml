openapi: 3.1.0
info:
  title: Bank Change Service API
  description: API for submitting bank details for a business
  version: '1.0.0'
  license:
    name: 'Open Government Licence v3.0'
    url: 'https://www.nationalarchives.gov.uk/doc/open-government-licence/version/3'
tags:
  - name: 'bank'
    description: API for submitting bank details
security:
  - mTLS: []
servers:
  - url: 'https://chs-upgrade-api.ruraldev.org.uk:8446/extapi'
    description: The test server for KITS/V1 APIs
paths:
  /bank-change-service/v1/submit:
    post:
      tags:
        - 'bank'
      summary: Submits bank change, to be sent to Azure Service Bus
      operationId: submitBankChange
      requestBody:
        required: true
        description: Bank change request data
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionRequest'
            examples:
              BankChangeRequest:
                summary: A bank change request
                description: Bank change request
                value:
                  sbi: '110405990'
                  frn: '10014489653'
                  crn: '1100209492'
                  submissionDateTime: 02/05/2026 14:12:11
                  account:
                    accountType: UK_BUSINESS
                    name: John Doe
                    number: '14345678'
                    iban: PT392831273127334616
                    buildingSocietyRollNumber: '2123414'
                    bank:
                      name: t1est
                      sortCode: '123456'
                      swiftCode: '8741136'
                  country:
                    code: IRL
                    currency: EUR
                  organisationId: '5583781'
                  personId: '5020949'
      responses:
        '200':
          description: Change processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultResponse'
              examples:
                ChangeProcessed:
                  summary: The bank change has been processed
                  description: Change processed
                  value: {}
        '400':
          description: field validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultResponse'
        '500':
          description: There was an unexpected service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultResponse'
components:
  securitySchemes:
    mTLS:
      type: mutualTLS
      description: >
        Mutual TLS authentication. Client must present a certificate issued by the server.
  schemas:
    SubmissionBankDetails:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        sortCode:
          type: [string, 'null']
        swiftCode:
          type: [string, 'null']
    SubmissionAccountDetails:
      type: object
      required:
        - accountType
        - name
        - bank
      anyOf:
        - required: [number]
        - required: [iban]
      properties:
        accountType:
          type: string
          enum:
            - EU
            - UK_PERSONAL
            - UK_BUSINESS
        name:
          type: string
          minLength: 1
        number:
          type: string
          minLength: 1
        iban:
          type: string
          minLength: 1
        buildingSocietyRollNumber:
          type: [string, 'null']
        bank:
          $ref: '#/components/schemas/SubmissionBankDetails'
    CountryDetails:
      type: object
      properties:
        # Upstream does not type-check country fields
        code:
          description: Country code (e.g. GB, IRL).
        currency:
          description: Currency code (e.g. EUR, GBP).
    SubmissionRequest:
      type: object
      examples:
        - organisationId: '1000000000'
          personId: '1000000000'
          sbi: '100000000'
          frn: '1000000000'
          crn: '1000000000'
          submissionDateTime: '01/02/2023 14:12:11'
          account:
            accountType: UK_BUSINESS
            name: John Doe
            number: '12345678'
            bank:
              name: Acme Bank
              sortCode: '123456'
          country:
            code: GB
            currency: GBP
      required:
        - organisationId
        - personId
        - sbi
        - frn
        - crn
        - submissionDateTime
        - account
      properties:
        organisationId:
          type: string
          minLength: 1
        personId:
          type: string
          minLength: 1
        sbi:
          type: string
          minLength: 1
        frn:
          type: string
          minLength: 1
        crn:
          type: string
          minLength: 1
        submissionDateTime:
          type: string
          minLength: 1
          example: '01/02/2023 14:12:11'
        account:
          $ref: '#/components/schemas/SubmissionAccountDetails'
        country:
          $ref: '#/components/schemas/CountryDetails'
    ResponseError:
      type: object
      properties:
        code:
          type: integer
        description:
          type: string
    DefaultResponse:
      type: object
      properties:
        id:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ResponseError'
